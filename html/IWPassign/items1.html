<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Items - QuickCart</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

header {
    background: #2ecc71;
    color: white;
    padding: 15px;
    text-align: center;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 30px;
}

.card {
    background: white;
    border-radius: 10px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.card h3 {
    margin: 10px 0;
}

.price {
    color: #27ae60;
    font-weight: bold;
}

button {
    padding: 10px 15px;
    background: #2ecc71;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #27ae60;
    transform: scale(1.05);
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.footer {
    background: #333;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>
</head>
<body>

<header>
    <h1>Fresh Grocery Items</h1>
</header>

<div class="container">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1567306226416-28f0efdc88ce">
        <h3>Apples</h3>
        <p class="price">₹120/kg</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1574226516831-e1dff420e37c">
        <h3>Milk</h3>
        <p class="price">₹60/L</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1582515073490-dc9d9c8b6e53">
        <h3>Bread</h3>
        <p class="price">₹40</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2">
        <h3>Tomatoes</h3>
        <p class="price">₹30/kg</p>
        <button>Add to Cart</button>
    </div>

</div>

<footer class="footer">
    <p>© 2026 QuickCart Items Page</p>
</footer>

</body>
</html>
