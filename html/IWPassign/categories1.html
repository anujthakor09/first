<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categories - QuickCart</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f8f9fa;
}

header {
    background: #2ecc71;
    color: white;
    padding: 15px 30px;
    text-align: center;
}

h1 {
    margin: 0;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 40px;
}

.card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.card h3 {
    padding: 15px;
}

/* Hover Effect */
.card:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.card:hover h3 {
    color: #2ecc71;
}

.footer {
    text-align: center;
    padding: 20px;
    background: #333;
    color: white;
}
</style>
</head>
<body>

<header>
    <h1>Shop by Categories</h1>
</header>

<div class="container">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1610348725531-843dff563e2c">
        <h3>Fruits</h3>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1606787366850-de6330128bfc">
        <h3>Vegetables</h3>
    </div>

    <div class="card">
        <a href="#" target="_blank"></a>
        <img src="https://images.unsplash.com/photo-1580910051074-3eb694886505">
        <h3>Dairy</h3>
    </div>
     <a href="#" target="_blank"></a>
    <div class="card">
        <img src="https://images.unsplash.com/photo-1604908177522-040d4b20f7aa">
        <h3>Snacks</h3>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1586201375761-83865001e31c">
        <h3>Beverages</h3>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1598514982846-1cf39f91e6e1">
        <h3>Household</h3>
    </div>

</div>

<footer class="footer">
    <p>© 2026 QuickCart Categories Page</p>
</footer>

</body>
</html>
