<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickCart - Instant Grocery</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

header {
    background: #2ecc71;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
}

nav a {
    margin: 0 15px;
    color: white;
    text-decoration: none;
    font-weight: bold;
    position: relative;
    transition: all 0.3s ease;
}

/* Hover Effect 1: Color + Scale */
nav a:hover {
    color: #f1c40f;
    transform: scale(1.1);
}

/* Hover Effect 2: Underline Animation */
nav a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    bottom: -5px;
    left: 0;
    background-color: #f1c40f;
    transition: width 0.3s ease;
}

nav a:hover::after {
    width: 100%;
}

/* Hover Effect 3: Glow Effect */
nav a:hover {
    text-shadow: 0 0 8px rgba(255,255,255,0.8);
}

.hero {
    background: url('https://images.unsplash.com/photo-1542838132-92c53300491e');
    background-size: cover;
    color: white;
    text-align: center;
    padding: 100px 20px;
}

.hero h1 {
    font-size: 50px;
}

.hero button {
    padding: 15px 30px;
    font-size: 18px;
    background: #27ae60;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.categories {
    display: flex;
    justify-content: space-around;
    padding: 40px 20px;
}

.card {
    border: 1px solid #ddd;
    padding: 20px;
    width: 200px;
    text-align: center;
    border-radius: 10px;
}

.card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
}

.footer {
    background: #333;
    color: white;
    text-align: center;
    padding: 20px;
}
</style>
</head>
<body>

<header>
    <h2>QuickCart</h2>
    <nav>
        <a href="#">Home</a>
        <a href="#">Categories</a>
        <a href="#">Offers</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>Groceries in Minutes!</h1>
    <p>Fresh fruits, vegetables & daily essentials delivered instantly</p>
    <button>Shop Now</button>
</section>

<section class="categories">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1610348725531-843dff563e2c">
        <h3>Fruits</h3>
    </div>
    <div class="card">
        <img src="https://images.unsplash.com/photo-1606787366850-de6330128bfc">
        <h3>Vegetables</h3>
    </div>
    <div class="card">
        <img src="https://images.unsplash.com/photo-1580910051074-3eb694886505">
        <h3>Dairy</h3>
    </div>
    <div class="card">
        <img src="https://images.unsplash.com/photo-1604908177522-040d4b20f7aa">
        <h3>Snacks</h3>
    </div>
</section>

<footer class="footer">
    <p>© 2026 QuickCart | Designed for College Assignment</p>
</footer>

</body>
</html>
